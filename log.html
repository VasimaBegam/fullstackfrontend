<!DOCTYPE html>
<html>

<head>
    <title>FitLog - Exercise Log Management</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #f4f6f9;
        }

        nav {
            background: #0d6efd;
            color: white;
            padding: 18px;
        }

        nav h2 {
            display: inline;
        }

        nav ul {
            list-style: none;
            float: right;
            display: flex;
            align-items: center;
        }

        nav ul li {
            display: inline;
            margin-left: 25px;
        }

        nav ul li a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        nav ul li a:hover {
            color: yellow;
        }

        .user-email {
            font-size: 14px;
            background: rgba(255, 255, 255, 0.2);
            padding: 5px 10px;
            border-radius: 4px;
            font-weight: normal;
        }

        .container {
            width: 90%;
            margin: auto;
        }

        h1 {
            text-align: center;
            margin-top: 30px;
            color: #0d6efd;
        }

        #crudSection {
            margin-top: 40px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        button {
            padding: 10px 20px;
            margin: 5px;
            background: #0d6efd;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #084298;
        }

        input, select {
            padding: 10px;
            margin: 5px;
            width: 250px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        table, tr, th, td {
            border: 1px solid gray;
        }

        th {
            background: #0d6efd;
            color: white;
        }

        th, td {
            padding: 10px;
            text-align: center;
        }
    </style>
</head>

<body>

    <nav>
        <h2>FitLog Exercise Log Panel</h2>
        <ul>
            <li><span id="nav-email" class="user-email">Logged in as: </span></li>
            <li><a href="Dashboard.html">🏠 Dashboard Hub</a></li>
            <li><a href="#" onclick="logout()">Logout</a></li>
        </ul>
    </nav>

    <div class="container">
        <h1>EXERCISE LOG MANAGEMENT</h1>

        <div id="crudSection">
            </div>
    </div>

    <script>
        const API = 'https://fullstackbackend-1-j1pu.onrender.com';
        const token = localStorage.getItem('jwt_token');
        const crud = document.getElementById("crudSection");

        // Auth Guard
        document.addEventListener("DOMContentLoaded", function() {
            if (!token) {
                window.location.href = '../login.html';
            } else {
                const liveEmail = localStorage.getItem('user_email');
                const displayName = (liveEmail && liveEmail !== "null" && liveEmail !== "undefined") ? liveEmail : 'Admin';
                document.getElementById('nav-email').textContent = 'Logged in as: ' + displayName;
                
                // Startup execution
                loadExerciseLog();
            }
        });

        function logout() {
            localStorage.removeItem('jwt_token');
            localStorage.removeItem('user_email');
            localStorage.removeItem('role');
            window.location.href = '../login.html';
        }

        function headers() {
            return {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + token
            };
        }

        // ─── EXERCISE LOG CRUD OPERATIONS ───

        function loadExerciseLog() {
            crud.innerHTML = `
                <h2 align="center">Exercise Log CRUD</h2>
                <br>
                <div style="text-align: center;">
                    <button onclick="postExerciseLog()">POST</button>
                    <button onclick="getAllExerciseLog()">GET ALL</button>
                    <button onclick="getByIdExerciseLog()">GET BY ID</button>
                    <button onclick="putExerciseLog()">PUT</button>
                    <button onclick="patchExerciseLog()">PATCH</button>
                    <button onclick="deleteExerciseLog()">DELETE</button>
                </div>
                <br><br>
                <div id="output"></div>
            `;
        }

        function postExerciseLog() {
            crud.innerHTML = `
                <h2>Exercise Log - POST (Add Log)</h2>
                <button onclick="loadExerciseLog()">⬅️ Back</button>
                <br><br>
                <input type="number" id="Id" placeholder="ID"><br>
                <input type="text" id="logExerciseName" placeholder="Exercise Name"><br>
                <input type="number" id="logActualSets" placeholder="Actual Sets"><br>
                <input type="number" id="logActualReps" placeholder="Actual Reps"><br>
                <input type="number" step="0.01" id="logActualWeight" placeholder="Actual Weight (Kg)"><br>
                <label style="margin: 5px; display: inline-block;">
                    <input type="checkbox" id="logIsPR" style="width: auto; margin-right: 5px;"> Personal Record (PR)?
                </label>
                <br><br>
                <button onclick="saveExerciseLog()">Save Log</button>
                <br><br>
                <p id="success" style="color:green; font-weight:bold;"></p>
                <p id="error" style="color:red; font-weight:bold;"></p>
            `;
        }

        async function saveExerciseLog() {
            const id = document.getElementById("Id").value;
            const exerciseName = document.getElementById("logExerciseName").value.trim();
            const actualSets = parseInt(document.getElementById("logActualSets").value);
            const actualReps = parseInt(document.getElementById("logActualReps").value);
            const actualWeightKg = parseFloat(document.getElementById("logActualWeight").value);
            const isPersonalRecord = document.getElementById("logIsPR").checked;

            if(!id || !exerciseName) return alert("Please fill ID and Exercise Name!");

            try {
                const response = await fetch(API + "/exercise/postData", {
                    method: "POST",
                    headers: headers(),
                    body: JSON.stringify({ id, exerciseName, actualSets, actualReps, actualWeightKg, isPersonalRecord })
                });

                if (response.ok) {
                    document.getElementById("success").innerHTML = "Log Saved Successfully 🎉";
                    document.getElementById("error").innerHTML = "";
                    // Reset fields
                    document.getElementById("Id").value = "";
                    document.getElementById("logExerciseName").value = "";
                    document.getElementById("logActualSets").value = "";
                    document.getElementById("logActualReps").value = "";
                    document.getElementById("logActualWeight").value = "";
                    document.getElementById("logIsPR").checked = false;
                } else {
                    document.getElementById("error").innerHTML = "Failed to Save Log ❌";
                    document.getElementById("success").innerHTML = "";
                }
            } catch (e) {
                document.getElementById("error").innerHTML = "Server Error ⚠️";
            }
        }

        async function getAllExerciseLog() {
            crud.innerHTML = `
                <h2>Exercise Log - GET ALL</h2>
                <button onclick="loadExerciseLog()">⬅️ Back</button>
                <br><br>
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Exercise Name</th>
                            <th>Sets</th>
                            <th>Reps</th>
                            <th>Weight (Kg)</th>
                            <th>PR?</th>
                        </tr>
                    </thead>
                    <tbody id="logTable"></tbody>
                </table>
            `;

            try {
                const response = await fetch(API + "/exercise/get", {
                    method: "GET",
                    headers: headers()
                });
                const data = await response.json();
                let rows = "";
                data.forEach(function (item) {
                    rows += `
                        <tr>
                            <td>${item.id}</td>
                            <td>${item.exerciseName}</td>
                            <td>${item.actualSets}</td>
                            <td>${item.actualReps}</td>
                            <td>${item.actualWeightKg} kg</td>
                            <td>${item.isPersonalRecord ? "🔥 Yes" : "No"}</td>
                        </tr>
                    `;
                });
                document.getElementById("logTable").innerHTML = rows;
            } catch (e) {
                alert("Unable to Fetch Logs");
            }
        }

        font
        function getByIdExerciseLog() {
            crud.innerHTML = `
                <h2>Exercise Log - GET BY ID</h2>
                <button onclick="loadExerciseLog()">⬅️ Back</button>
                <br><br>
                <input type="number" id="searchLogId" placeholder="Enter Log ID">
                <br><br>
                <button onclick="searchExerciseLog()">Search</button>
                <br><br>
                <div id="logResult"></div>
            `;
        }

        async function searchExerciseLog() {
            const id = document.getElementById("searchLogId").value;
            if (!id) return alert("Please enter an ID");

            try {
                const response = await fetch(API + "/exercise/get/" + id, {
                    method: "GET",
                    headers: headers()
                });
                if (response.ok) {
                    const data = await response.json();
                    document.getElementById("logResult").innerHTML = `
                        <table>
                            <tr><th>ID</th><th>Exercise Name</th><th>Sets</th><th>Reps</th><th>Weight</th><th>PR?</th></tr>
                            <tr>
                                <td>${data.id}</td>
                                <td>${data.exerciseName}</td>
                                <td>${data.actualSets}</td>
                                <td>${data.actualReps}</td>
                                <td>${data.actualWeightKg} kg</td>
                                <td>${data.isPersonalRecord ? "🔥 Yes" : "No"}</td>
                            </tr>
                        </table>
                    `;
                } else {
                    document.getElementById("logResult").innerHTML = "<h3 style='color:red;'>Log Not Found</h3>";
                }
            } catch (e) {
                alert("Server Error");
            }
        }

        function putExerciseLog() {
            crud.innerHTML = `
                <h2>Update Exercise Log (PUT)</h2>
                <button onclick="loadExerciseLog()">⬅️ Back</button>
                <br><br>
                <input type="number" id="updateLogId" placeholder="Enter Log ID"><br>
                <input type="text" id="updateLogName" placeholder="Exercise Name"><br>
                <input type="number" id="updateLogSets" placeholder="Actual Sets"><br>
                <input type="number" id="updateLogReps" placeholder="Actual Reps"><br>
                <input type="number" step="0.01" id="updateLogWeight" placeholder="Actual Weight (Kg)"><br>
                <label style="margin: 5px; display: inline-block;">
                    <input type="checkbox" id="updateLogPR" style="width: auto; margin-right: 5px;"> Personal Record (PR)?
                </label>
                <br><br>
                <button onclick="updateExerciseLogLogic()">Update Log</button>
                <br><br>
                <p id="success" style="color:green; font-weight:bold;"></p>
                <p id="error" style="color:red; font-weight:bold;"></p>
            `;
        }

        async function updateExerciseLogLogic() {
            const id = document.getElementById("updateLogId").value;
            const exerciseName = document.getElementById("updateLogName").value.trim();
            const actualSets = parseInt(document.getElementById("updateLogSets").value);
            const actualReps = parseInt(document.getElementById("updateLogReps").value);
            const actualWeightKg = parseFloat(document.getElementById("updateLogWeight").value);
            const isPersonalRecord = document.getElementById("updateLogPR").checked;

            try {
                const response = await fetch(API + "/exercise/get/" + id, {
                    method: "PUT",
                    headers: headers(),
                    body: JSON.stringify({ exerciseName, actualSets, actualReps, actualWeightKg, isPersonalRecord })
                });

                if (response.ok) {
                    document.getElementById("success").innerHTML = "Log Updated Successfully 👍";
                    document.getElementById("error").innerHTML = "";
                } else {
                    document.getElementById("error").innerHTML = "Update Failed ❌";
                    document.getElementById("success").innerHTML = "";
                }
            } catch (e) {
                document.getElementById("error").innerHTML = "Server Error ⚠️";
            }
        }

        function patchExerciseLog() {
            crud.innerHTML = `
                <h2>Modify Exercise Log (PATCH)</h2>
                <button onclick="loadExerciseLog()">⬅️ Back</button>
                <br><br>
                <input type="number" id="patchLogId" placeholder="Enter Log ID"><br>
                <input type="text" id="patchLogName" placeholder="Exercise Name (Optional)"><br>
                <input type="number" id="patchLogSets" placeholder="Actual Sets (Optional)"><br>
                <input type="number" id="patchLogReps" placeholder="Actual Reps (Optional)"><br>
                <input type="number" step="0.01" id="patchLogWeight" placeholder="Actual Weight (Kg) (Optional)"><br>
                <label style="margin: 5px; display: inline-block;">
                    <input type="checkbox" id="patchLogPR" style="width: auto; margin-right: 5px;"> Personal Record (PR)?
                </label>
                <br><br>
                <button onclick="modifyExerciseLogLogic()">Modify Log</button>
                <br><br>
                <p id="success" style="color:green; font-weight:bold;"></p>
                <p id="error" style="color:red; font-weight:bold;"></p>
            `;
        }

        async function modifyExerciseLogLogic() {
            const id = document.getElementById("patchLogId").value;
            const exerciseName = document.getElementById("patchLogName").value.trim();
            const setsInput = document.getElementById("patchLogSets").value;
            const repsInput = document.getElementById("patchLogReps").value;
            const weightInput = document.getElementById("patchLogWeight").value;
            const isPersonalRecord = document.getElementById("patchLogPR").checked;

            const bodyData = {};
            if (exerciseName) bodyData.exerciseName = exerciseName;
            if (setsInput) bodyData.actualSets = parseInt(setsInput);
            if (repsInput) bodyData.actualReps = parseInt(repsInput);
            if (weightInput) bodyData.actualWeightKg = parseFloat(weightInput);
            bodyData.isPersonalRecord = isPersonalRecord; 

            try {
                const response = await fetch(API + "/exercise/get/" + id, {
                    method: "PATCH",
                    headers: headers(),
                    body: JSON.stringify(bodyData)
                });

                if (response.ok) {
                    document.getElementById("success").innerHTML = "Log Modified Successfully 👍";
                    document.getElementById("error").innerHTML = "";
                } else {
                    document.getElementById("error").innerHTML = "Modification Failed ❌";
                    document.getElementById("success").innerHTML = "";
                }
            } catch (e) {
                document.getElementById("error").innerHTML = "Server Error ⚠️";
            }
        }

        function deleteExerciseLog() {
            crud.innerHTML = `
                <h2>Delete Exercise Log 🗑️</h2>
                <button onclick="loadExerciseLog()">⬅️ Back</button>
                <br><br>
                <input type="number" id="deleteLogId" placeholder="Enter Log ID">
                <br><br>
                <button onclick="removeExerciseLog()">Delete</button>
                <br><br>
                <p id="success" style="color:green; font-weight:bold;"></p>
                <p id="error" style="color:red; font-weight:bold;"></p>
            `;
        }

        async function removeExerciseLog() {
            const id = document.getElementById("deleteLogId").value;
            if(!id) return alert("Please enter an ID to delete!");

            if(!confirm("Are you sure you want to delete this log?")) return;

            try {
                const response = await fetch(API + "/exercise/" + id, {
                    method: "DELETE",
                    headers: headers()
                });

                if (response.ok) {
                    document.getElementById("success").innerHTML = "Log Deleted Successfully 🧹";
                    document.getElementById("error").innerHTML = "";
                    document.getElementById("deleteLogId").value = "";
                } else {
                    document.getElementById("error").innerHTML = "Delete Failed ❌";
                    document.getElementById("success").innerHTML = "";
                }
            } catch (e) {
                document.getElementById("error").innerHTML = "Server Error ⚠️";
            }
        }
    </script>
</body>
</html>
