<!DOCTYPE html>
<html>

<head>
    <title>FitLog - Fitness Metric Management</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #f4f6f9;
        }

        nav {
            background: #0d6efd;
            color: white;
            padding: 18px;
        }

        nav h2 {
            display: inline;
        }

        nav ul {
            list-style: none;
            float: right;
            display: flex;
            align-items: center;
        }

        nav ul li {
            display: inline;
            margin-left: 25px;
        }

        nav ul li a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        nav ul li a:hover {
            color: yellow;
        }

        .user-email {
            font-size: 14px;
            background: rgba(255, 255, 255, 0.2);
            padding: 5px 10px;
            border-radius: 4px;
            font-weight: normal;
        }

        .container {
            width: 90%;
            margin: auto;
        }

        h1 {
            text-align: center;
            margin-top: 30px;
            color: #0d6efd;
        }

        #crudSection {
            margin-top: 40px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        button {
            padding: 10px 20px;
            margin: 5px;
            background: #0d6efd;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #084298;
        }

        input, select {
            padding: 10px;
            margin: 5px;
            width: 250px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        table, tr, th, td {
            border: 1px solid gray;
        }

        th {
            background: #0d6efd;
            color: white;
        }

        th, td {
            padding: 10px;
            text-align: center;
        }
    </style>
</head>

<body>

    <nav>
        <h2>FitLog Fitness Metric Panel</h2>
        <ul>
            <li><span id="nav-email" class="user-email">Logged in as: </span></li>
            <li><a href="Dashboard.html">🏠 Dashboard Hub</a></li>
            <li><a href="#" onclick="logout()">Logout</a></li>
        </ul>
    </nav>

    <div class="container">
        <h1>FITNESS METRIC MANAGEMENT</h1>

        <div id="crudSection">
            </div>
    </div>

    <script>
        const API = 'https://fullstackbackend-1-j1pu.onrender.com';
        const token = localStorage.getItem('jwt_token');
        const crud = document.getElementById("crudSection");

        // Auth Guard
        document.addEventListener("DOMContentLoaded", function() {
            if (!token) {
                window.location.href = '../login.html';
            } else {
                const liveEmail = localStorage.getItem('user_email');
                const displayName = (liveEmail && liveEmail !== "null" && liveEmail !== "undefined") ? liveEmail : 'Admin';
                document.getElementById('nav-email').textContent = 'Logged in as: ' + displayName;
                
                // Startup execution
                loadFitnessMetric();
            }
        });

        function logout() {
            localStorage.removeItem('jwt_token');
            localStorage.removeItem('user_email');
            localStorage.removeItem('role');
            window.location.href = '../login.html';
        }

        // Common API Headers configuration
        function headers() {
            return {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + token
            };
        }

        // ─── FITNESS METRIC CRUD OPERATIONS ───

        function loadFitnessMetric() {
            crud.innerHTML = `
                <h2 align="center">Fitness Metric CRUD</h2>
                <br>
                <div style="text-align: center;">
                    <button onclick="postFitnessMetric()">POST</button>
                    <button onclick="getAllFitnessMetric()">GET ALL</button>
                    <button onclick="getByIdFitnessMetric()">GET BY ID</button>
                    <button onclick="putFitnessMetric()">PUT</button>
                    <button onclick="patchFitnessMetric()">PATCH</button>
                    <button onclick="deleteFitnessMetric()">DELETE</button>
                </div>
                <br><br>
                <div id="output"></div>
            `;
        }

        function postFitnessMetric() {
            crud.innerHTML = `
                <h2>Fitness Metric - POST (Add Metric)</h2>
                <button onclick="loadFitnessMetric()">⬅ Back</button>
                <br><br>
                <input type="number" id="metricId" placeholder="ID"><br>
                <label style="margin: 5px; display: inline-block; font-size: 14px; color: gray;">Recorded Date:</label><br>
                <input type="date" id="metricDate"><br>
                <input type="number" step="0.01" id="metricWeight" placeholder="Body Weight (Kg)"><br>
                <input type="number" step="0.01" id="metricFat" placeholder="Body Fat Percentage (%)"><br>
                <input type="number" step="0.01" id="metricChest" placeholder="Chest Circumference (Cm)"><br>
                <input type="number" step="0.01" id="metricWaist" placeholder="Waist Circumference (Cm)"><br>
                <br>
                <button onclick="saveFitnessMetricLogic()">Save Metric</button>
                <br><br>
                <p id="success" style="color:green; font-weight:bold;"></p>
                <p id="error" style="color:red; font-weight:bold;"></p>
            `;
        }

        async function saveFitnessMetricLogic() {
            const id = document.getElementById("metricId").value;
            const recordedDate = document.getElementById("metricDate").value; 
            const bodyWeightKg = parseFloat(document.getElementById("metricWeight").value);
            const bodyFatPercentage = parseFloat(document.getElementById("metricFat").value);
            const chestCircumferenceCm = parseFloat(document.getElementById("metricChest").value);
            const waistCircumferenceCm = parseFloat(document.getElementById("metricWaist").value);

            if(!id || !recordedDate) return alert("Please fill up the ID and Recorded Date fields!");

            try {
                const response = await fetch(API + "/fit/postData", {
                    method: "POST",
                    headers: headers(),
                    body: JSON.stringify({ id, recordedDate, bodyWeightKg, bodyFatPercentage, chestCircumferenceCm, waistCircumferenceCm })
                });

                if (response.ok) {
                    document.getElementById("success").innerHTML = "Metric Saved Successfully 🎉";
                    document.getElementById("error").innerHTML = "";
                    // Reset fields
                    document.getElementById("metricId").value = "";
                    document.getElementById("metricDate").value = "";
                    document.getElementById("metricWeight").value = "";
                    document.getElementById("metricFat").value = "";
                    document.getElementById("metricChest").value = "";
                    document.getElementById("metricWaist").value = "";
                } else {
                    document.getElementById("error").innerHTML = "Failed to Save Metric ❌";
                    document.getElementById("success").innerHTML = "";
                }
            } catch (e) {
                document.getElementById("error").innerHTML = "Server Error ⚠️";
            }
        }

        async function getAllFitnessMetric() {
            crud.innerHTML = `
                <h2>Fitness Metric - GET ALL</h2>
                <button onclick="loadFitnessMetric()">⬅ Back</button>
                <br><br>
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Recorded Date</th>
                            <th>Weight (Kg)</th>
                            <th>Body Fat (%)</th>
                            <th>Chest (Cm)</th>
                            <th>Waist (Cm)</th>
                        </tr>
                    </thead>
                    <tbody id="metricTable"></tbody>
                </table>
            `;

            try {
                const response = await fetch(API + "/fit/get", {
                    method: "GET",
                    headers: headers()
                });
                const data = await response.json();
                let rows = "";
                data.forEach(function (item) {
                    rows += `
                        <tr>
                            <td>${item.id}</td>
                            <td>${item.recordedDate || "—"}</td>
                            <td>${item.bodyWeightKg ? item.bodyWeightKg + " kg" : "—"}</td>
                            <td>${item.bodyFatPercentage ? item.bodyFatPercentage + "%" : "—"}</td>
                            <td>${item.chestCircumferenceCm ? item.chestCircumferenceCm + " cm" : "—"}</td>
                            <td>${item.waistCircumferenceCm ? item.waistCircumferenceCm + " cm" : "—"}</td>
                        </tr>
                    `;
                });
                document.getElementById("metricTable").innerHTML = rows;
            } catch (e) {
                alert("Unable to Fetch Metrics");
            }
        }

        function getByIdFitnessMetric() {
            crud.innerHTML = `
                <h2>Fitness Metric - GET BY ID</h2>
                <button onclick="loadFitnessMetric()">⬅ Back</button>
                <br><br>
                <input type="number" id="searchMetricId" placeholder="Enter Metric ID">
                <br><br>
                <button onclick="searchFitnessMetricLogic()">Search</button>
                <br><br>
                <div id="metricResult"></div>
            `;
        }

        async function searchFitnessMetricLogic() {
            const id = document.getElementById("searchMetricId").value;
            if (!id) return alert("Please enter an ID");

            try {
                const response = await fetch(API + "/fit/get/" + id, {
                    method: "GET",
                    headers: headers()
                });
                if (response.ok) {
                    const data = await response.json();
                    document.getElementById("metricResult").innerHTML = `
                        <table>
                            <tr><th>ID</th><th>Recorded Date</th><th>Weight</th><th>Body Fat</th><th>Chest</th><th>Waist</th></tr>
                            <tr>
                                <td>${data.id}</td>
                                <td>${data.recordedDate || "—"}</td>
                                <td>${data.bodyWeightKg ? data.bodyWeightKg + " kg" : "—"}</td>
                                <td>${data.bodyFatPercentage ? data.bodyFatPercentage + "%" : "—"}</td>
                                <td>${data.chestCircumferenceCm ? data.chestCircumferenceCm + " cm" : "—"}</td>
                                <td>${data.waistCircumferenceCm ? data.waistCircumferenceCm + " cm" : "—"}</td>
                            </tr>
                        </table>
                    `;
                } else {
                    document.getElementById("metricResult").innerHTML = "<h3 style='color:red;'>Metric Not Found</h3>";
                }
            } catch (e) {
                alert("Server Error");
            }
        }

        function putFitnessMetric() {
            crud.innerHTML = `
                <h2>Update Fitness Metric (PUT)</h2>
                <button onclick="loadFitnessMetric()">⬅ Back</button>
                <br><br>
                <input type="number" id="updateMetricId" placeholder="Enter Metric ID"><br>
                <label style="margin: 5px; display: inline-block; font-size: 14px; color: gray;">Recorded Date:</label><br>
                <input type="date" id="updateMetricDate"><br>
                <input type="number" step="0.01" id="updateMetricWeight" placeholder="Body Weight (Kg)"><br>
                <input type="number" step="0.01" id="updateMetricFat" placeholder="Body Fat Percentage (%)"><br>
                <input type="number" step="0.01" id="updateMetricChest" placeholder="Chest Circumference (Cm)"><br>
                <input type="number" step="0.01" id="updateMetricWaist" placeholder="Waist Circumference (Cm)"><br>
                <br>
                <button onclick="updateFitnessMetricLogic()">Update Metric</button>
                <br><br>
                <p id="success" style="color:green; font-weight:bold;"></p>
                <p id="error" style="color:red; font-weight:bold;"></p>
            `;
        }

        async function updateFitnessMetricLogic() {
            const id = document.getElementById("updateMetricId").value;
            const recordedDate = document.getElementById("updateMetricDate").value;
            const bodyWeightKg = parseFloat(document.getElementById("updateMetricWeight").value);
            const bodyFatPercentage = parseFloat(document.getElementById("updateMetricFat").value);
            const chestCircumferenceCm = parseFloat(document.getElementById("updateMetricChest").value);
            const waistCircumferenceCm = parseFloat(document.getElementById("updateMetricWaist").value);

            try {
                const response = await fetch(API + "/fit/get/" + id, {
                    method: "PUT",
                    headers: headers(),
                    body: JSON.stringify({ recordedDate, bodyWeightKg, bodyFatPercentage, chestCircumferenceCm, waistCircumferenceCm })
                });

                if (response.ok) {
                    document.getElementById("success").innerHTML = "Metric Updated Successfully 👍";
                    document.getElementById("error").innerHTML = "";
                } else {
                    document.getElementById("error").innerHTML = "Update Failed ❌";
                    document.getElementById("success").innerHTML = "";
                }
            } catch (e) {
                document.getElementById("error").innerHTML = "Server Error ⚠️";
            }
        }

        function patchFitnessMetric() {
            crud.innerHTML = `
                <h2>Modify Fitness Metric (PATCH)</h2>
                <button onclick="loadFitnessMetric()">⬅ Back</button>
                <br><br>
                <input type="number" id="patchMetricId" placeholder="Enter Metric ID"><br>
                <label style="margin: 5px; display: inline-block; font-size: 14px; color: gray;">Recorded Date (Optional):</label><br>
                <input type="date" id="patchMetricDate"><br>
                <input type="number" step="0.01" id="patchMetricWeight" placeholder="Body Weight (Kg) (Optional)"><br>
                <input type="number" step="0.01" id="patchMetricFat" placeholder="Body Fat Percentage (%) (Optional)"><br>
                <input type="number" step="0.01" id="patchMetricChest" placeholder="Chest Circumference (Cm) (Optional)"><br>
                <input type="number" step="0.01" id="patchMetricWaist" placeholder="Waist Circumference (Cm) (Optional)"><br>
                <br>
                <button onclick="modifyFitnessMetricLogic()">Modify Metric</button>
                <br><br>
                <p id="success" style="color:green; font-weight:bold;"></p>
                <p id="error" style="color:red; font-weight:bold;"></p>
            `;
        }

        async function modifyFitnessMetricLogic() {
            const id = document.getElementById("patchMetricId").value;
            const recordedDate = document.getElementById("patchMetricDate").value;
            const weightInput = document.getElementById("patchMetricWeight").value;
            const fatInput = document.getElementById("patchMetricFat").value;
            const chestInput = document.getElementById("patchMetricChest").value;
            const waistInput = document.getElementById("patchMetricWaist").value;

            const bodyData = {};
            if (recordedDate) bodyData.recordedDate = recordedDate;
            if (weightInput) bodyData.bodyWeightKg = parseFloat(weightInput);
            if (fatInput) bodyData.bodyFatPercentage = parseFloat(fatInput);
            if (chestInput) bodyData.chestCircumferenceCm = parseFloat(chestInput);
            if (waistInput) bodyData.waistCircumferenceCm = parseFloat(waistInput);

            try {
                const response = await fetch(API + "/fit/get/" + id, {
                    method: "PATCH",
                    headers: headers(),
                    body: JSON.stringify(bodyData)
                });

                if (response.ok) {
                    document.getElementById("success").innerHTML = "Metric Modified Successfully 👍";
                    document.getElementById("error").innerHTML = "";
                } else {
                    document.getElementById("error").innerHTML = "Modification Failed ❌";
                    document.getElementById("success").innerHTML = "";
                }
            } catch (e) {
                document.getElementById("error").innerHTML = "Server Error ⚠️";
            }
        }

        function deleteFitnessMetric() {
            crud.innerHTML = `
                <h2>Delete Fitness Metric 🗑️</h2>
                <button onclick="loadFitnessMetric()">⬅ Back</button>
                <br><br>
                <input type="number" id="deleteMetricId" placeholder="Enter Metric ID">
                <br><br>
                <button onclick="removeFitnessMetricLogic()">Delete</button>
                <br><br>
                <p id="success" style="color:green; font-weight:bold;"></p>
                <p id="error" style="color:red; font-weight:bold;"></p>
            `;
        }

        async function removeFitnessMetricLogic() {
            const id = document.getElementById("deleteMetricId").value;
            if(!id) return alert("Please enter a Metric ID to delete!");

            if(!confirm("Are you sure you want to delete this fitness metric?")) return;

            try {
                const response = await fetch(API + "/fit/" + id, {
                    method: "DELETE",
                    headers: headers()
                });

                if (response.ok) {
                    document.getElementById("success").innerHTML = "Metric Deleted Successfully 🧹";
                    document.getElementById("error").innerHTML = "";
                    document.getElementById("deleteMetricId").value = "";
                } else {
                    document.getElementById("error").innerHTML = "Delete Failed ❌";
                    document.getElementById("success").innerHTML = "";
                }
            } catch (e) {
                document.getElementById("error").innerHTML = "Server Error ⚠️";
            }
        }
    </script>
</body>
</html>
